<div class="container">
  <div class="card col-md-6 offset-3 mt-2">
     <div class="card-header">New customers</div>
     <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleSaveCustomer()">
       <div class="mb-3">
         <label class="form-label">Name:</label>
         <input type="text" formControlName="name" class="form-control">
         <span class="text-danger"
           *ngIf="newCustomerFormGroup.get('name')?.hasError('required')">

           Name is required
         </span>
       </div>
       <div class="mb-3">
         <label class="form-label">Email:</label>
         <input type="text" formControlName="email" class="form-control">
         <span class="text-danger"
               *ngIf="newCustomerFormGroup.get('email')?.hasError('required')">
           Email is required
         </span>
       </div>
      <button [disabled]="!newCustomerFormGroup.valid" class="btn btn-success">Save</button>
     </form>
  </div>
</div>
